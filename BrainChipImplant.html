<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complextro AI Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(500px); }
        }
        .animate-scanline { animation: scanline 3s linear infinite; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen flex flex-col items-center p-4 sm:p-8">

    <h1 class="text-xl sm:text-2xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500">
        AMYGDALIA COMPLEXTRO AR
    </h1>

    <div class="flex flex-col items-center gap-4 p-2 w-full max-w-[500px]">
        <button id="toggleBtn" class="px-6 py-2 bg-emerald-950 border border-emerald-500 rounded-full text-emerald-100 hover:bg-emerald-900 transition-all font-bold text-xs uppercase">
            INTERFACE: CANVAS
        </button>

        <div id="viewContainer" class="w-full aspect-square border border-emerald-500/30 rounded-lg overflow-hidden bg-black shadow-[0_0_50px_rgba(0,255,153,0.2)] relative flex items-center justify-center">
            <canvas id="brainCanvas" width="500" height="500" class="w-full h-full"></canvas>
            <div id="arView" class="hidden absolute inset-0 bg-emerald-950/20 flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 border border-emerald-500/50 opacity-30 pointer-events-none grid grid-cols-8 grid-rows-8"></div>
                <div class="absolute inset-0 animate-scanline bg-gradient-to-b from-transparent via-emerald-500/20 to-transparent h-16"></div>
                <div class="absolute top-1/4 left-1/4 w-8 h-8 border-t-2 border-l-2 border-emerald-400"></div>
                <div class="absolute bottom-1/4 right-1/4 w-8 h-8 border-b-2 border-r-2 border-emerald-400"></div>
                <div class="text-emerald-400 font-mono text-[12px] uppercase animate-pulse border border-emerald-500 px-2 py-1 bg-black/50">AI_SCANNER: ONLINE</div>
            </div>
        </div>

        <div class="bg-black p-5 rounded-xl border border-emerald-900/50 w-full font-mono text-xs text-emerald-400 shadow-inner">
            <h3 class="text-emerald-100 mb-3 border-b border-emerald-900 pb-1 uppercase">Complextro AI Scanner</h3>
            <p id="activeMessage" class="leading-relaxed">COMPLEXTRO_SIGNAL: ANALYZING NEURAL FLUX...</p>
            <div class="mt-6 pt-2 border-t border-emerald-900 text-[10px] text-gray-500 flex justify-between">
                <span>AI_CONFIDENCE: 98.4%</span>
                <span>MODE: <span id="modeText">CANVAS</span></span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('brainCanvas');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const arView = document.getElementById('arView');
        const modeText = document.getElementById('modeText');
        let viewMode = 'canvas';
        let time = 0;

        function render() {
            if (viewMode !== 'canvas') return;
            ctx.fillStyle = 'rgba(5, 5, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const size = 8;
            for (let x = -4; x <= 4; x++) {
                for (let y = -4; y <= 4; y++) {
                    const pulse = Math.sin(time * 2 + x + y) * 10;
                    ctx.fillStyle = 'hsl(' + ((time * 40 + (x + y) * 20) % 360) + ', 80%, 60%)';
                    ctx.fillRect(centerX + x * 16, centerY + y * 16 + pulse, size, size);
                }
            }

            ctx.strokeStyle = '#00ff99';
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x += 5) {
                const y = centerY + 100 + Math.sin(x * 0.02 + time * 3) * 30;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            time += 0.05;
            requestAnimationFrame(render);
        }

        toggleBtn.addEventListener('click', () => {
            viewMode = viewMode === 'canvas' ? 'ar' : 'canvas';
            modeText.textContent = viewMode.toUpperCase();
            toggleBtn.textContent = 'INTERFACE: ' + (viewMode === 'canvas' ? 'CANVAS' : 'AR');
            
            if (viewMode === 'canvas') {
                canvas.classList.remove('hidden');
                arView.classList.add('hidden');
                render();
            } else {
                canvas.classList.add('hidden');
                arView.classList.remove('hidden');
            }
        });

        render();
    </script>
</body>
</html>
